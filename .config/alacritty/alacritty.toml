# Shift-click: URLs → browser, images → Preview, text → nvim tmux popup
[[hints.enabled]]
regex = "https?://[\\w./\\-?&=@%+:~#!$,;*()]+[\\w/]|\\$\\{?\\w+\\}?(?:/[\\w./\\-]+)+|(?:~|/)[^\\s\\]\\r\\n][^\\s\\]\\r\\n]*\\.[\\w-]+(?:/[^\\s\\]\\r\\n]+)*(?::\\d+(?::\\d+)?)?|(?:\\.{1,2}/)[^\\s\\]\\r\\n][^\\s\\]\\r\\n]*\\.[\\w-]+(?:/[^\\s\\]\\r\\n]+)*(?::\\d+(?::\\d+)?)?|[\\w.@\\-]+(?:/[^\\s\\]\\r\\n][^\\s\\]\\r\\n]*)+\\.[\\w-]+(?:/[^\\s\\]\\r\\n]+)*(?::\\d+(?::\\d+)?)?|[\\w.@\\-]+\\.[\\w-]+(?::\\d+(?::\\d+)?)?|(?-u:\\b)E\\d{4}(?-u:\\b)"
hyperlinks = true
mouse = { enabled = true, mods = "Shift" }
command = { program = "/Users/ab/.dotfiles/scripts/open-hint.sh" }
post_processing = true

[mouse]
hide_when_typing = false

[[mouse.bindings]]
action = "ReceiveChar"
mouse = "Right"

[scrolling]
history = 0

[selection]
save_to_clipboard = true

# Use login shell so PATH includes Homebrew (works on both Apple Silicon and Intel)
[terminal.shell]
program = "/bin/zsh"
args = ["-l", "-c", "exec tmux new-session -A"]

[window]
decorations = "None"
padding = { x = 0, y = 0 }
dynamic_padding = true
startup_mode = "Maximized"
option_as_alt = "Both"
opacity = 1
blur = true
