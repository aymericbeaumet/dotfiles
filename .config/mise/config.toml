[settings]
# Keep the shell prompt offline without going offline everywhere. The prompt
# cost came from mise's precmd `hook-env` trying to auto-install missing tools —
# resolving `= "latest"` against api.github.com on every prompt. Disabling only
# passive auto-install keeps prompts instant and network-free, while real work
# still hits the network: tools install on demand when you actually run them
# (exec_auto_install / not_found_auto_install stay on) and `mise install` /
# `mise use` work normally.
auto_install = false

[tools]
awscli = "latest"
bat = "latest"
buf = "1.69.0"
bun = "latest"
carapace = "latest"
cmake = "latest"
coreutils = "latest"
delta = "latest"
docker-cli = "latest"
dust = "latest"
