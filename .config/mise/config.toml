[settings]
# Keep the shell prompt fully offline. Without this, mise's precmd `hook-env`
# resolves `= "latest"` for aqua-backed tools (e.g. jwt-cli) by hitting
# api.github.com on every prompt — particularly when a tool is missing
# locally and auto_install wants to know what version to fetch.
# To install or upgrade tools, run with `MISE_OFFLINE=0 mise install ...`.
offline = true

[tools]
awscli = "latest"
bat = "latest"
buf = "1.69.0"
bun = "latest"
carapace = "latest"
cmake = "latest"
coreutils = "latest"
delta = "latest"
docker-cli = "latest"
dust = "latest"
eza = "latest"
fd = "latest"
ffmpeg = "latest"
fzf = "latest"
gh = "latest"
git-lfs = "latest"
glow = "latest"
go = "1.25"
gradle = "latest"
jq = "latest"
lazydocker = "latest"
lazygit = "latest"
lnav = "latest"
neovim = "latest"
node = "26.0.0"
opentofu = "1.12.2"
pipx = "latest"
protoc = "34.1"
ripgrep = "latest"
rtk = "latest"
rust = "latest"
sd = "latest"
shfmt = "3.13.1"
terraform = "1.14.3"
tmux = "latest"
uv = "0.11.15"
watchexec = "latest"
websocat = "latest"
zoxide = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@openai/codex" = "latest"
"npm:ccusage" = "latest"
"npm:vercel" = "latest"
"npm:wrangler" = "latest"
