name: headquarter
root: ~
on_project_start: tmux set -t headquarter remain-on-exit on \; set -t headquarter allow-rename off

windows:
  - btop: tmux select-pane -T btop && btop
  - nvtop: tmux select-pane -T nvtop && nvtop
  - rustnet: tmux select-pane -T rustnet && sudo rustnet
  - lazydocker: tmux select-pane -T lazydocker && lazydocker
