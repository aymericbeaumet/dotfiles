[hints]
keys = "<colemak>"

[open]
ignored_apps = ["com.flash.app", "com.flash.native-fixture", "com.flash.native-oracle", "com.flash.vimium-oracle"]

[statusbar]
enabled = true
monitor = "primary"
template = """
#[align=left]#{mode}#[fg=colour245] · #[link=https://news.ycombinator.com]#[fg=colour178]HN#[fg=colour245]#[nolink] #{=80…:cycle:../../scripts/hn-top-stories.sh}

#[align=center]#{active_app_name}

#[align=right]
#[link=https://claude.ai/new#settings/usage]#[fg=colour178]Cld#[fg=colour245] #{script:../../scripts/agent-quota-status.sh --claude}#[nolink]
#[fg=colour245] · #[link=https://chatgpt.com/codex/cloud/settings/analytics#usage]#[fg=colour178]Cdx#[fg=colour245] #{script:../../scripts/agent-quota-status.sh --codex}#[nolink]
#[fg=colour245] · #{plugin:system.battery}
#[fg=colour245] · #{date}
"""

[flashlight]
suggestion_count = 10

[debug]
log_level = "trace"

[mode]
sequence_timeout_ms = 1000

[mode.all.mappings]
# enter modes
"cmd+ctrl+[" = ["flash", "enter_normal_mode"]
"cmd+ctrl+;" = ["flash", "enter_command_mode"]
"cmd+<space>" = ["flash", "enter_command_mode", "--input=:flashlight "]
"cmd+ctrl+<space>" = ["flash", "enter_command_mode", "--input=:flashlight @emojis.glyphs ", "--restore-mode"]
# window management
"alt+h" = ["flash", "window_move", "--position=lefthalf"]
"alt+j" = ["flash", "window_move", "--position=bottomhalf"]
"alt+k" = ["flash", "window_move", "--position=tophalf"]
"alt+l" = ["flash", "window_move", "--position=righthalf"]
"alt+m" = ["flash", "window_move", "--position=maximized"]
"alt+n" = ["flash", "window_move", "--screen=+1"]
"alt+p" = ["flash", "window_move", "--screen=-1"]

[mode.normal]
leader = "<space>"
# Unmapped chords carrying these modifiers pass through to the focused app
# (e.g. cmd+T -> new tab) while staying in NORMAL. Explicit mappings still win.
passthrough_modifiers = ["cmd"]

[mode.normal.mappings]
# convenient utilities
"<leader>m" = ["sh", "../../scripts/toggle_mute.sh"]
"<leader>p" = ["sh", "../../scripts/toggle_play.sh"]
"<leader>s" = ["sh", "../../scripts/toggle_sleep.sh"]
"<leader>w" = ["sh", "../../scripts/toggle_wifi.sh"]
# karabiner remaps
"<delete_forward>" = ["flash", "scroll_half_page_down"] # ctrl+d
"<tab>" = ["flash", "movement_forward"]                 # ctrl+i
"cmd+<delete>" = ["flash", "scroll_half_page_up"]       # ctrl+u
"cmd+<right>" = ["flash", "scroll_down"]                # ctrl+e
# app switch
"'a" = ["flash", "app_open", "--name=Alacritty"]
"'f" = ["flash", "app_open", "--name=Firefox"]
"'i" = ["flash", "app_open", "--name=Messages"]
"'l" = ["flash", "app_open", "--name=Linear"]
"'n" = ["flash", "app_open", "--name=Notes"]
"'o" = ["flash", "app_open", "--name=Notion"]
"'p" = ["flash", "app_open", "--name=Postico 2"]
"'r" = ["flash", "app_open", "--name=Reminders"]
"'s" = ["flash", "app_open", "--name=Slack"]
"'y" = ["flash", "app_open", "--name=Spotify"]
"'w" = ["flash", "app_open", "--name=WhatsApp"]
