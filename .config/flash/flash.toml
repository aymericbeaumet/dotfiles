[hints]
keys = "<colemak>"

[shortcuts]
# Navigation
"ctrl+space" = "flash://show_hints"

# App switcher
"cmd+ctrl+a" = "flash://open_app?name=Alacritty"
"cmd+ctrl+c" = "flash://open_app?name=Cursor"
"cmd+ctrl+f" = "flash://open_app?name=Firefox"
"cmd+ctrl+i" = "flash://open_app?name=Messages"
"cmd+ctrl+l" = "flash://open_app?name=Linear"
"cmd+ctrl+n" = "flash://open_app?name=Notes"
"cmd+ctrl+o" = "flash://open_app?name=Notion"
"cmd+ctrl+p" = "flash://open_app?name=Postico 2"
"cmd+ctrl+r" = "flash://open_app?name=Reminders"
"cmd+ctrl+s" = "flash://open_app?name=Slack"
"cmd+ctrl+w" = "flash://open_app?name=WhatsApp"
"cmd+ctrl+y" = "flash://open_app?name=Spotify"

# Window management
"alt+h" = "flash://move_window?position=lefthalf"
"alt+l" = "flash://move_window?position=righthalf"
"alt+k" = "flash://move_window?position=tophalf"
"alt+j" = "flash://move_window?position=bottomhalf"
"alt+m" = "flash://move_window?position=maximized"
"alt+n" = "flash://move_window?screen=+1"
"alt+p" = "flash://move_window?screen=-1"

# System control
"alt+shift+c" = ["../../scripts/toggle_caffeinate.sh"]
"alt+shift+d" = ["../../scripts/toggle_darkmode.sh"]
"alt+shift+m" = ["../../scripts/toggle_mute.sh"]
"alt+shift+w" = ["../../scripts/toggle_wifi.sh"]

[debug]
log_level = "debug"
dump_logs = true
