# Github: @aymericbeaumet/dotfiles

# Ensure Homebrew binaries are available in run-shell commands
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin"

# Reset all prefix bindings on reload
unbind-key -a -T prefix
bind r source "$HOME/.tmux.conf" \; display-message "Config reloaded"

# Prefix: C-q
set -g prefix C-q
bind C-q send-prefix

# Window management
# Note: pane_current_path can briefly point into ~/.local/share/zinit/plugins/* while
# zinit's turbo mode is sourcing a plugin (it cd's the main shell, sources, cd's back).
# Fall back to $HOME when that race is hit.
unbind c
bind   t new-window -a -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},/Users/ab,#{pane_current_path}}"
bind C-t new-window -a -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},/Users/ab,#{pane_current_path}}"
bind   n next-window
bind C-n next-window
bind   p previous-window
bind C-p previous-window

# Session management
bind   S run-shell 'tmux list-sessions -F "##{session_name}" | fzf-tmux -p --reverse --header="Switch session" | xargs -r -I{} tmux switch-client -t {}'
bind   1 run-shell 'tmux has-session -t scratch      2>/dev/null || tmuxinator start scratch      --no-attach; tmux switch-client -t scratch'
bind   2 run-shell 'tmux has-session -t beside       2>/dev/null || tmuxinator start beside       --no-attach; tmux switch-client -t beside'
bind   3 run-shell 'tmux has-session -t headquarter  2>/dev/null || tmuxinator start headquarter  --no-attach; tmux switch-client -t headquarter'

# Splits (same zinit plugin-dir guard as above)
bind   v split-window -h -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},/Users/ab,#{pane_current_path}}"
bind C-v split-window -h -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},/Users/ab,#{pane_current_path}}"
bind   s split-window -v -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},/Users/ab,#{pane_current_path}}"
bind C-s split-window -v -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},/Users/ab,#{pane_current_path}}"

# Pane navigation (prefix + hjkl as backup, C-hjkl handled by vim-tmux-navigator)
bind      h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind BSpace if -F '#{pane_at_left}'   '' 'select-pane -L'
bind      j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind    C-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind      k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind    C-k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind      l if -F '#{pane_at_right}'  '' 'select-pane -R'
bind    C-l if -F '#{pane_at_right}'  '' 'select-pane -R'

# Pane swapping
bind H swap-pane -s '{left-of}'
bind J swap-pane -s '{down-of}'
bind K swap-pane -s '{up-of}'
bind L swap-pane -s '{right-of}'

# Search
bind / command-prompt -p "(search down)" "copy-mode; send -X search-forward  \"%%%\""
bind ? command-prompt -p "(search up)"   "copy-mode; send -X search-backward \"%%%\""

# Misc (x = kill pane; q conflicts with prefix C-q)
# Kill pane: SIGKILL the whole process group so detached children
# (servers, &-disowned jobs, nohup'd procs) don't linger.
bind x run-shell 'pgid=$(ps -o pgid= -p #{pane_pid} 2>/dev/null | tr -d " "); [ -n "$pgid" ] && kill -KILL -- -"$pgid" 2>/dev/null; true' \; kill-pane
bind [ copy-mode

# Copy mode (vi)
set -g mode-keys vi
set -g escape-time 0
bind -T copy-mode-vi y send -X copy-pipe "pbcopy"
bind -T copy-mode-vi enter send -X copy-pipe "squeeze -1 --url --open"
# Mouse: keep selection / copy mode after copy (default uses copy-pipe-and-cancel)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe "pbcopy"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe "pbcopy"
bind -T copy-mode-vi escape send -X cancel
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi u send -X halfpage-up
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Status bindings
set -g status-keys emacs

# Performance & behavior
setw -g aggressive-resize on
set -g history-limit 50000
set -g focus-events on
set -g renumber-windows on
set -g display-time 3000
set -g repeat-time 600
set -g detach-on-destroy off
set -g set-clipboard on

# Quiet
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -gw monitor-activity off
set -g bell-action none

# Mouse
set -g mouse on

# True color support (same as original - don't change without full tmux restart)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -ga terminal-features "*:hyperlinks"

# Windows
set -g base-index 1
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Panes
set -g pane-border-style fg=colour178
set -g pane-active-border-style fg=colour178
set -g pane-border-status off
setw -g pane-base-index 1

# Status bar (3 lines: top border, sessions+info, window names)
set -g status 3
set -g status-interval 5
set -g status-position top
set -g status-style fg=colour245,bg=default
set -g status-left-length 100
# Sessions list (inline format so it re-renders instantly on session-change, no shell cache)
set -g status-left '\
#{?#{S:#{?#{==:#{session_name},scratch},1,}},#{?#{==:#{client_session},scratch},#[range=user|scratch fg=colour178 bold] scratch #[norange nobold fg=colour178]│,#[range=user|scratch fg=colour245] scratch #[norange fg=colour178]│},}\
#{?#{S:#{?#{==:#{session_name},beside},1,}},#{?#{==:#{client_session},beside},#[range=user|beside fg=colour178 bold] beside #[norange nobold fg=colour178]│,#[range=user|beside fg=colour245] beside #[norange fg=colour178]│},}\
#{?#{S:#{?#{==:#{session_name},headquarter},1,}},#{?#{==:#{client_session},headquarter},#[range=user|headquarter fg=colour178 bold] headquarter #[norange nobold fg=colour178]│,#[range=user|headquarter fg=colour245] headquarter #[norange fg=colour178]│},}'
set -g status-right "#(pgrep -f acvc-openvpn >/dev/null && echo '#[fg=colour178]aws' || echo '#[fg=red]aws')#[fg=colour178] │ #(~/.tmux/wifi-status.sh)#[fg=colour178] │ #(~/.tmux/battery-status.sh)#[fg=colour178] │ %a %b %d %H:%M "
set -g status-right-length 80
# Line 0: system info on the right (no box drawing)
set -g status-format[0] '#[fg=colour178,align=right range=right]#{T:status-right}#[norange]'
# Line 1: sessions list (tabbed on the left, mirroring the windows row)
set -g status-format[1] '#[fg=colour178,align=right]╣#[align=left]╔╡#{T:status-left}══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════'
# Line 2: window names with trailing ═══╝ (range=user|<index> so the index reaches the click handler)
set -g status-format[2] '#[fg=colour178,align=right]╝#[align=left]╚═╡#{W:#[range=user|#{window_index} fg=colour245] #W #[norange fg=colour178]│,#[range=user|#{window_index} fg=colour0 bg=colour178] #W #[norange bg=default fg=colour178]│}══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════'

# Click on a session (line 1, range=user|<name>) switches client; click on a window (line 2, range=user|<index>) selects it
bind -T root MouseDown1Status run-shell -b 'r="#{mouse_status_range}"; [ -z "$r" ] && exit 0; case "$r" in *[!0-9]*) tmux switch-client -t "$r" ;; *) tmux select-window -t ":$r" ;; esac'

# Copy mode theme
set -g mode-style fg=colour255,bg=colour178
set-hook -g pane-mode-changed 'if -F "#{m/r:(copy|view)-mode,#{pane_mode}}" "set status-style fg=colour255,bg=colour178" "set -u status-style"'

# ─────────────────────────────────────────────────────────────
# QUICK ACCESS POPUPS (fzf/tool integration)
# ─────────────────────────────────────────────────────────────
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -lc lazygit"
bind C-g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -lc lazygit"
bind   b run-shell 'tmux list-windows -F "##{window_index}: ##{window_name}" | fzf-tmux -p --reverse | cut -d: -f1 | xargs -I{} tmux select-window -t {}'
bind C-b run-shell 'tmux list-windows -F "##{window_index}: ##{window_name}" | fzf-tmux -p --reverse | cut -d: -f1 | xargs -I{} tmux select-window -t {}'
bind   B run-shell 'tmux list-windows -a -F "##{session_name}:##{window_index}: [##{session_name}] ##{window_name}" | fzf-tmux -p --reverse | cut -d: -f1-2 | xargs -I{} tmux switch-client -t {}'

# ─────────────────────────────────────────────────────────────
# PLUGINS
# ─────────────────────────────────────────────────────────────

# Required for headless TPM operations (install/update scripts)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'

# Vimium-style hints for copy/open
# Usage: prefix + y triggers thumbs, then:
#   - type hint in lowercase → copy to clipboard
#   - type hint in UPPERCASE → copy + open
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key y
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && open {}'

# Enhanced copy mode - o to open, O to edit, S to search
set -g @plugin 'tmux-plugins/tmux-open'

# Battery
set -g @plugin 'tmux-plugins/tmux-battery'

# Kill frozen processes (prefix + C-c twice)
set -g @plugin 'tmux-plugins/tmux-cowboy'


# Auto-install TPM if missing, then initialize (keep at bottom)
if "test ! -d ${TMUX_PLUGIN_MANAGER_PATH}/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${TMUX_PLUGIN_MANAGER_PATH}/tpm && ${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'"
run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'

# tmux-open binds o with copy-pipe-and-cancel; use copy-pipe to keep the selection
bind -T copy-mode-vi o send -X copy-pipe "sed s/##/####/g | xargs -I {} tmux run-shell -b 'cd #{pane_current_path}; open \"{}\" > /dev/null'"

# Signal setup.sh (or any wait-for listener) that config sourcing is complete.
# No-ops when nothing is waiting on this channel.
run 'tmux wait-for -S tpm-ready 2>/dev/null || true'

# Auto-start persistent tmuxinator sessions (idempotent)
if-shell 'tmux has-session -t scratch 2>/dev/null'     '' 'run-shell -b "tmuxinator start scratch     --no-attach >/dev/null 2>&1"'
if-shell 'tmux has-session -t beside 2>/dev/null'      '' 'run-shell -b "tmuxinator start beside      --no-attach >/dev/null 2>&1"'
if-shell 'tmux has-session -t headquarter 2>/dev/null' '' 'run-shell -b "tmuxinator start headquarter --no-attach >/dev/null 2>&1"'
