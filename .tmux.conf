# Author: Aymeric Beaumet <hi@aymericbeaumet.com> (https://aymericbeaumet.com)
# Github: @aymericbeaumet/dotfiles

# Ensure Homebrew binaries are available in run-shell commands
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin:/usr/bin:/bin:/usr/sbin:/sbin"

bind r source "$HOME/.tmux.conf" \; display-message "Config reloaded"

# Prefix: C-q
set -g prefix C-q
bind C-q send-prefix

# Window management
# Note: pane_current_path can briefly point into ~/.local/share/zinit/plugins/* while
# zinit's turbo mode is sourcing a plugin (it cd's the main shell, sources, cd's back).
# Fall back to $HOME when that race is hit.
bind   c new-window -a -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},#{HOME},#{pane_current_path}}"
bind -r C-n next-window
bind -r C-p previous-window
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1
bind -r - resize-pane -L 5
bind -r + resize-pane -R 5

# Session management
# Note: switch-client runs as a tmux command (after \;), not via shell. Running it
# inside run-shell loses the calling-client context and the binding errors with
# "returned 1" even when the session exists.
bind   1 run-shell 'tmux has-session -t =headquarter 2>/dev/null || tmuxinator start headquarter --no-attach' \; switch-client -t headquarter
bind   2 run-shell 'tmux has-session -t =scratch     2>/dev/null || tmuxinator start scratch     --no-attach' \; switch-client -t scratch
bind   3 run-shell 'tmux has-session -t =beside      2>/dev/null || tmuxinator start beside      --no-attach' \; switch-client -t beside

# Grid layout (reading order navigation)
bind 9 run-shell '~/.dotfiles/scripts/grid.sh --rows=3 --cols=3'
bind ( run-shell '~/.dotfiles/scripts/grid.sh --rows=3 --cols=3 --claude'

# Splits (same zinit plugin-dir guard as above)
bind   v split-window -h -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},#{HOME},#{pane_current_path}}"
bind C-v split-window -h -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},#{HOME},#{pane_current_path}}"
bind   s split-window -v -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},#{HOME},#{pane_current_path}}"
bind C-s split-window -v -c "#{?#{m:*/zinit/plugins/*,#{pane_current_path}},#{HOME},#{pane_current_path}}"

# Pane navigation
bind      h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind BSpace if -F '#{pane_at_left}'   '' 'select-pane -L'
bind      j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind    C-j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind      k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind    C-k if -F '#{pane_at_top}'    '' 'select-pane -U'
bind      l if -F '#{pane_at_right}'  '' 'select-pane -R'
bind    C-l if -F '#{pane_at_right}'  '' 'select-pane -R'


# Balance panes (spread evenly within the current layout)
bind = select-layout -E

# Search
bind / command-prompt -p "(search down)" "copy-mode; send -X search-forward  \"%%%\""
bind ? command-prompt -p "(search up)"   "copy-mode; send -X search-backward \"%%%\""

# Command prompt
bind N command-prompt -p "Session name:" "new-session -A -s '%%' -c '#{?#{m:*/zinit/plugins/*,#{pane_current_path}},#{HOME},#{pane_current_path}}'"

# Misc
bind & if -F '#{==:#{session_name},headquarter}' '' 'confirm-before -p "kill window \"#W\"? (y/n)" kill-window'
bind x confirm-before -p 'kill pane #P "#{pane_current_command}"? (y/n)' kill-pane
bind C-h if -F '#{pane_at_left}'   '' 'select-pane -L'
bind O select-pane -t :.-
bind u copy-mode \; send -X halfpage-up
bind C-u copy-mode \; send -X halfpage-up
bind V copy-mode \; send -X select-line

# Pane actions: break / join / pipe / menu
bind B break-pane
bind J choose-tree -Zw "join-pane -h -s '%%'"
bind '|' pipe-pane -o "cat >>/tmp/tmux-#{session_name}-#{window_index}-#{pane_index}.log" \; \
  display-message "pipe-pane toggled → /tmp/tmux-#{session_name}-#{window_index}-#{pane_index}.log"
bind e display-menu -T "#[align=centre]Pane actions" \
  "Break to new window"     b "break-pane" \
  "Join pane from…"         j "choose-tree -Zw \"join-pane -h -s '%%'\"" \
  "Toggle pane sync"        s "setw synchronize-panes" \
  "Toggle pipe to log"      l "pipe-pane -o 'cat >>/tmp/tmux-#{session_name}-#{window_index}-#{pane_index}.log'" \
  "" \
  "Swap with previous"      p "swap-pane -U" \
  "Swap with next"          n "swap-pane -D" \
  "" \
  "Kill pane"               x "confirm-before -p 'kill pane? (y/n) ' kill-pane"

# Copy mode (vi)
set -g mode-keys vi
set -g escape-time 0
bind -T copy-mode-vi y send -X copy-pipe "pbcopy"
bind -T copy-mode-vi enter send -X copy-pipe "squeeze -1 --url --open"
# Mouse: keep selection / copy mode after copy (default uses copy-pipe-and-cancel)
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe "pbcopy"
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send -X select-word \; run-shell -d 0.3 \; send -X copy-pipe "pbcopy"
bind -T copy-mode-vi TripleClick1Pane select-pane \; send -X select-line \; run-shell -d 0.3 \; send -X copy-pipe "pbcopy"
bind -T copy-mode-vi escape send -X cancel
bind -T copy-mode-vi d send -X halfpage-down
bind -T copy-mode-vi u send -X halfpage-up
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Copy-mode search highlighting (tmux 3.4+). Vi jumps f/F/t/T, g/G, B/W/E are built-in.
set -g copy-mode-match-style 'fg=colour0,bg=colour178'
set -g copy-mode-current-match-style 'fg=colour0,bg=colour215,bold'

# Status bindings
set -g status-keys emacs

# Performance & behavior
setw -g aggressive-resize on
set -g history-limit 50000
set -g focus-events on
set -g renumber-windows on
set -g display-time 3000
set -g repeat-time 600
set -g detach-on-destroy off
set -g destroy-unattached off
set -g exit-empty off
set -g set-clipboard on

# Protect headquarter session: keep panes alive if processes exit, block rename
set-hook -g session-created 'if -F "#{==:#{session_name},headquarter}" "set remain-on-exit on ; set allow-rename off"'

# Quiet
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
set -gw monitor-activity off
set -g bell-action none

# Mouse
set -g mouse on

# Alt+click opens the OSC-8 hyperlink under the cursor (tmux 3.4+ exposes #{mouse_hyperlink}).
# No fallback: a plain click without a hyperlink just selects the pane as usual.
bind -T root M-MouseDown1Pane if -F '#{mouse_hyperlink}' \
  'run-shell -b "open #{q:mouse_hyperlink}"'

# True color support (same as original - don't change without full tmux restart)
set -g default-terminal "tmux-256color"
set -as terminal-features ',*:RGB,*:hyperlinks,*:sixel,*:overline,*:strikethrough,*:usstyle'

# Windows
set -g base-index 1
set -g allow-rename off
set -g automatic-rename on
set -g automatic-rename-format "#{b:pane_current_path}"

# Panes
set -g pane-border-style fg=colour240,bg=#3B4252
set -g pane-active-border-style fg=colour178,bg=terminal
set -g pane-border-lines heavy
set -g pane-border-indicators off
set -g pane-border-status top
set -g pane-scrollbars on
set -g pane-scrollbars-position right
set -g pane-scrollbars-style fg=colour240,bg=#3B4252
# Agent hooks set @agent-kind/@agent-idle; command fallbacks keep older panes labelled.
# E: lets pane titles carry tmux style sequences.
set -g pane-border-format '#[align=centre] #{?window_zoomed_flag,#[fg=colour178 bold][ZOOMED]#[default],#{?@agent-kind,#{?@agent-idle,#[fg=green bold],#[fg=blue nobold]}[#{@agent-kind}] #{?pane_title,#{E:pane_title},#{b:pane_current_path}}#[default],#{?#{m:claude*,#{pane_current_command}},#{?@agent-idle,#[fg=green bold],#[fg=blue nobold]}[claude] #{?pane_title,#{E:pane_title},#{b:pane_current_path}}#[default],#{?#{m:codex*,#{pane_current_command}},#{?@agent-idle,#[fg=green bold],#[fg=blue nobold]}[codex] #{?pane_title,#{E:pane_title},#{b:pane_current_path}}#[default],#{?#{m:agy*,#{pane_current_command}},#{?@agent-idle,#[fg=green bold],#[fg=blue nobold]}[agy] #{?pane_title,#{E:pane_title},#{b:pane_current_path}}#[default],#{pane_current_path}:#{pane_current_command}}}}}} '
set -g window-style bg=#3B4252
set -g window-active-style bg=terminal
setw -g pane-base-index 1

# Status bar (2 lines: top info, active session + window names)
set -g status 2
set -g status-interval 5
set -g status-position top
set -g status-style fg=colour245,bg=#2E3440
set -g status-right "#(~/.dotfiles/scripts/agent-quota-status.sh)#[fg=colour245] · #(~/.dotfiles/scripts/battery-status.sh)#[fg=colour245] · #(~/.dotfiles/scripts/ip-status.sh)#[fg=colour245] · #[range=user|cal fg=colour178]%a %b %-d %H:%M#[norange]"
set -g status-right-length 160
# Line 0: session name + windows on the left, system info on the right, closed with ╠╗ mirror.
set -g status-format[0] '#[fg=colour178,align=left]╔╣#[range=user|session-picker fg=colour178 bold] #S #[norange fg=colour178 nobold]│#{W:#[range=user|#{window_index} fg=colour245] #{?#{||:#{||:#{m:claude,#W},#{m:codex,#W}},#{m:agy,#W}},#[bold]#W#[nobold],#W} #[norange fg=colour178]│,#[range=user|#{window_index} fg=colour0 bg=colour178] #W #[norange bg=default fg=colour178]│}#[align=right range=right]#{T:status-right} #[norange fg=colour178]╠╗'
# Line 1: bottom border. Rendered by a helper since tmux's #{=N:...} truncation
# does not expand nested formats for N — passing client_width via #() works, and
# tmux re-runs the command whenever the expanded argument changes.
set -g status-format[1] '#[fg=colour178]#(~/.dotfiles/scripts/status-bottom.sh #{client_width})'

# Clickable status-bar regions: session-picker, window indices, Network/Battery
# system settings. Dispatched in ~/.dotfiles/scripts/status-click.sh.
bind -T root MouseDown1Status run-shell -b '~/.dotfiles/scripts/status-click.sh "#{mouse_status_range}"'

# Copy mode theme
set -g mode-style fg=colour255,bg=colour178
# pane-scrollbars-style is a real pane option — keep it per-pane. Cursor colour
# stays default in copy mode (terminal's own cursor colour) so it doesn't blend
# into the selection highlight.
set-hook -g pane-mode-changed 'if -F "#{m/r:(copy|view)-mode,#{pane_mode}}" "set -p pane-scrollbars-style fg=colour178,bg=#3B4252" "set -pu pane-scrollbars-style"'
# pane-active-border-style is window-scoped, so per-pane overrides leak. Drive it
# off the focused pane's mode instead: refresh on focus change and on mode change
# (only when the changed pane is currently the active one).
set-hook -g pane-focus-in 'if -F "#{m/r:(copy|view)-mode,#{pane_mode}}" "set -w pane-active-border-style fg=colour178,bg=terminal" "set -wu pane-active-border-style"'
set-hook -g -a pane-mode-changed 'if -F "#{pane_active}" "if -F \"#{m/r:(copy|view)-mode,#{pane_mode}}\" \"set -w pane-active-border-style fg=colour178,bg=terminal\" \"set -wu pane-active-border-style\""'

# ─────────────────────────────────────────────────────────────
# QUICK ACCESS POPUPS (fzf/tool integration)
# ─────────────────────────────────────────────────────────────

bind C display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -lc claude"
bind G display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -lc lazygit"
bind P display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "zsh -lc '~/.dotfiles/scripts/pr-info.sh'"
bind W run-shell 'tmux list-windows -a -F "##{session_name}:##{window_index}	[##{session_name}] ##{window_name} (##{pane_current_command})" | fzf-tmux -p --reverse --info=hidden --header="Switch window" --with-nth=2.. --delimiter="\t" | cut -f1 | xargs -I{} tmux switch-client -t {}'

# ─────────────────────────────────────────────────────────────
# PLUGINS
# ─────────────────────────────────────────────────────────────

# Required for headless TPM operations (install/update scripts)
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'

# Persist sessions, windows, panes, running commands, and pane history.
# Manual save/restore use S/R to avoid clobbering the existing C-s split binding.
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-dir '$HOME/.local/share/tmux/resurrect'
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-processes ':all:'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-pane-contents-area 'full'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'

# Vimium-style hints for copy/open
# Usage: prefix + y triggers thumbs, then:
#   - type hint in lowercase → copy to clipboard
#   - type hint in UPPERCASE → copy + open
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key y
set -g @thumbs-command 'echo -n {} | pbcopy'
set -g @thumbs-upcase-command 'echo -n {} | pbcopy && open {}'

# Enhanced copy mode - o to open, O to edit, S to search
set -g @plugin 'tmux-plugins/tmux-open'

# Battery
set -g @plugin 'tmux-plugins/tmux-battery'

# Kill frozen processes (prefix + C-c twice)
set -g @plugin 'tmux-plugins/tmux-cowboy'


# Auto-install TPM if missing, then initialize (keep at bottom)
if "test ! -d ${TMUX_PLUGIN_MANAGER_PATH}/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${TMUX_PLUGIN_MANAGER_PATH}/tpm && ${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'"
run '${TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm'

# Wrap saves so panes with an empty title do not shift tmux-resurrect's
# tab-separated fields and lose their process command.
set -g @resurrect-save-script-path "$HOME/.dotfiles/scripts/tmux-resurrect-save.sh"
bind S run-shell "$HOME/.dotfiles/scripts/tmux-resurrect-save.sh"

# tmux-open binds o to URL-opener; override with vim-style other-end (swap cursor
# to the opposite end of the selection). URL/path opening remains on Enter via
# the squeeze --url --open binding above.
bind -T copy-mode-vi o send -X other-end

# tmux-cowboy unconditionally binds `*` to kill -KILL its foreground process.
# Override here (post-TPM) to add a confirm prompt matching `&`'s style.
bind * confirm-before -p 'kill process "#{pane_current_command}"? (y/n)' \
  'run-shell "$HOME/.tmux/plugins/tmux-cowboy/scripts/kill.sh KILL"'

# Signal setup.sh (or any wait-for listener) that config sourcing is complete.
# No-ops when nothing is waiting on this channel.
run 'tmux wait-for -S tpm-ready 2>/dev/null || true'

# Fallback only for first-run/no-save cases. Once resurrect has a save file,
# let it restore the real environment instead of racing tmuxinator defaults.
if-shell 'test -e "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/last"' '' 'run-shell -b "tmux has-session -t headquarter 2>/dev/null || tmuxinator start headquarter --no-attach >/dev/null 2>&1"'
if-shell 'test -e "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/last"' '' 'run-shell -b "tmux has-session -t scratch     2>/dev/null || tmuxinator start scratch     --no-attach >/dev/null 2>&1"'
if-shell 'test -e "${XDG_DATA_HOME:-$HOME/.local/share}/tmux/resurrect/last"' '' 'run-shell -b "tmux has-session -t beside      2>/dev/null || tmuxinator start beside      --no-attach >/dev/null 2>&1"'
